<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Buddy - Kotlin/JS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            height: 100%;
            background: #050508;
        }

        :root {
            --primary-dark: #0f172a;
            --secondary-dark: #1e293b;
            --tertiary-dark: #334155;
            --teal-accent: #14b8a6;
            --gold-accent: #f59e0b;
            --vibrant-purple: #14b8a6;
            --success-green: #10b981;
            --error-red: #ef4444;
            --glass-light: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-light: #f1f5f9;
            --text-secondary: #cbd5e1;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #1a1f35 100%);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: var(--bg-gradient);
            height: 100%;
            min-height: 100vh;
            color: var(--text-light);
            overflow-x: hidden;
        }

        #root {
            width: 100%;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            background: #050508;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1.5px solid var(--glass-border);
            border-radius: 0.75rem;
            font-size: 1rem;
            font-family: inherit;
            background: var(--glass-light);
            color: var(--text-light);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        input[type="email"]:focus,
        input[type="password"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: var(--teal-accent);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 20px rgba(20, 184, 166, 0.3);
        }

        input[type="email"]::placeholder,
        input[type="password"]::placeholder,
        input[type="text"]::placeholder {
            color: var(--text-secondary);
        }

        button {
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s ease;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(20, 184, 166, 0.3);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        .nav-btn {
            font-size: 1.25rem !important;
            opacity: 0.7;
            transition: all 0.3s ease;
        }

        .nav-btn.active {
            opacity: 1;
            transform: scale(1.1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                transform: translateX(-50%) translateY(100%);
                opacity: 0;
            }

            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        @keyframes glow {

            0%,
            100% {
                box-shadow: 0 0 20px rgba(20, 184, 166, 0.5);
            }

            50% {
                box-shadow: 0 0 30px rgba(20, 184, 166, 0.8);
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Loading Spinner Styles */
        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid var(--glass-border);
            border-radius: 50%;
            border-top-color: var(--teal-accent);
            animation: spin 1s linear infinite;
        }

        .loading-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-gradient);
        }

        .loading-text {
            margin-top: 1.5rem;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 1.125rem;
            letter-spacing: 0.5px;
        }

        /* Glassmorphism Card Styles */
        .glass-card {
            background: var(--glass-light);
            border: 1px solid var(--glass-border);
            border-radius: 1.25rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--teal-accent);
            box-shadow: 0 12px 48px rgba(20, 184, 166, 0.2);
            transform: translateY(-4px);
        }

        /* Error Toast */
        .error-toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(239, 68, 68, 0.95);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            border: 1px solid rgba(239, 68, 68, 0.5);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease-out;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .success-toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(16, 185, 129, 0.95);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            border: 1px solid rgba(16, 185, 129, 0.5);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease-out;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        /* Meditation Card Styles */
        .meditation-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.5rem;
            border: 1px solid var(--glass-border);
            border-radius: 1rem;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
            background: var(--glass-light);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .meditation-card:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--teal-accent);
            box-shadow: 0 8px 30px rgba(20, 184, 166, 0.2);
            transform: translateX(4px);
        }

        .meditation-start-btn {
            background: linear-gradient(135deg, #14b8a6 0%, #0891b2 100%);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(20, 184, 166, 0.3);
        }

        .meditation-start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(20, 184, 166, 0.5);
            background: linear-gradient(135deg, #0d9488 0%, #0891b2 100%);
        }

        .meditation-start-btn:active {
            transform: translateY(0);
        }

        /* Button Loading State */
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .retry-button {
            background: linear-gradient(135deg, #14b8a6 0%, #0891b2 100%);
            color: white;
            padding: 0.875rem 2rem;
            border: none;
            border-radius: 0.75rem;
            cursor: pointer;
            margin-top: 1.5rem;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
            transition: all 0.3s ease;
        }

        .retry-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(139, 92, 246, 0.5);
        }

        .error-message {
            color: #fca5a5;
            font-size: 0.95rem;
            margin-top: 0.75rem;
            text-align: center;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--teal-accent);
            box-shadow: 0 0 10px rgba(20, 184, 166, 0.3);
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script>
        // Fitness Buddy - Kotlin/JS Fitness App
        let currentPage = "dashboard";
        let isDarkMode = false;
        let isLoggedIn = false;
        let isLoading = false;
        let lastError = null;

        // PageBridge fallback for testing/development
        if (typeof window.PageBridge === 'undefined') {
            window.PageBridge = {
                startMeditation: (sessionId) => console.log('Meditation started:', sessionId),
                pauseMeditation: () => console.log('Meditation paused'),
                resumeMeditation: () => console.log('Meditation resumed'),
                stopMeditation: () => console.log('Meditation stopped'),
                onMeditationComplete: (sessionId, duration) => console.log('Meditation complete:', sessionId, duration),
                sendOtp: (phone) => JSON.stringify({ status: 'pending', message: `OTP sent to ${phone}` }),
                loginWithOtp: (phone, otp) => JSON.stringify({ success: true, message: 'Logged in', token: 'sample_token' }),
                getUserProfile: () => JSON.stringify({ id: '123', name: 'User', email: 'user@example.com' }),
                getSteps: () => {
                    try { return window.MainActivity.getRemoteSteps(); }
                    catch (e) { return JSON.stringify({ steps: 5000, goal: 10000, progress: 0.5 }); }
                },
                getCalories: () => {
                    try { return window.MainActivity.getRemoteCalories(); }
                    catch (e) { return JSON.stringify({ calories: 1000, goal: 750, progress: 1.33 }); }
                },
                getHeartRate: () => {
                    try { return window.MainActivity.getRemoteHeartRate(); }
                    catch (e) { return JSON.stringify({ bpm: 80, avg: 80, min: 70, max: 95 }); }
                }
            };
        }

        // LoginBridge fallback for testing/development
        if (typeof window.LoginBridge === 'undefined') {
            window.LoginBridge = {
                notifyLoginSuccess: () => console.log('Login successful notification sent')
            };
        }

        // Get page from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const pageParam = urlParams.get('page');

        function showLoading(message = "Loading...") {
            isLoading = true;
            const root = document.getElementById("root");
            root.innerHTML = `
                <div class="loading-container">
                    <div style="text-align: center;">
                        <div class="loading-spinner"></div>
                        <p class="loading-text">${message}</p>
                    </div>
                </div>
            `;
        }

        function showError(message, onRetry = null) {
            lastError = message;
            const root = document.getElementById("root");
            const errorHtml = `
                <div style="min-height: 100vh; background: linear-gradient(180deg, #050508 0%, #080810 35%, #0A0A14 65%, #050508 100%); display: flex; align-items: center; justify-content: center; padding: 1rem;">
                    <div style="background: rgba(13, 13, 20, 0.9); border: 1px solid rgba(255, 69, 58, 0.2); border-radius: 1.5rem; padding: 2.5rem; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 40px rgba(255, 69, 58, 0.05); max-width: 420px; width: 100%; text-align: center; backdrop-filter: blur(20px);">
                        <p style="font-size: 3rem; margin-bottom: 1rem;">⚠️</p>
                        <h2 style="color: #F5F5F7; margin-bottom: 1rem; font-weight: 700;">Error</h2>
                        <p class="error-message" style="margin-bottom: 1.5rem; color: #FF453A; font-size: 0.95rem;">${message}</p>
                        ${onRetry ? `<button class="retry-button" onclick="${onRetry}" style="background: linear-gradient(135deg, #30D158 0%, #00F0FF 100%); color: #000; border: none; padding: 0.875rem 2rem; border-radius: 2rem; font-weight: 700; cursor: pointer; font-size: 1rem; box-shadow: 0 4px 20px rgba(48, 209, 88, 0.3);">Retry</button>` : ''}
                    </div>
                </div>
            `;
            root.innerHTML = errorHtml;
        }

        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = isError ? 'error-toast' : 'success-toast';
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        function showSignUpPage() {
            const root = document.getElementById("root");
            root.innerHTML = renderSignUpPage();
            setupSignUpEventListeners(root);
        }

        function renderSignUpPage() {
            return `
                <style>
                    @keyframes neonPulse {
                        0%, 100% { filter: drop-shadow(0 0 15px rgba(0, 240, 255, 0.4)) drop-shadow(0 0 30px rgba(48, 209, 88, 0.2)); }
                        50% { filter: drop-shadow(0 0 25px rgba(0, 240, 255, 0.6)) drop-shadow(0 0 50px rgba(48, 209, 88, 0.35)); }
                    }
                    @keyframes floatOrb {
                        0%, 100% { transform: translate(0, 0) scale(1); }
                        33% { transform: translate(15px, -20px) scale(1.05); }
                        66% { transform: translate(-10px, 10px) scale(0.95); }
                    }
                    .auth-input-dark {
                        width: 100%;
                        padding: 1rem 1.25rem;
                        border: 1.5px solid rgba(255, 255, 255, 0.08);
                        border-radius: 1rem;
                        font-size: 1rem;
                        background: rgba(13, 13, 20, 0.8);
                        color: #F5F5F7;
                        transition: all 0.3s ease;
                        font-weight: 500;
                        backdrop-filter: blur(10px);
                        font-family: inherit;
                    }
                    .auth-input-dark:focus {
                        outline: none;
                        border-color: #00F0FF;
                        box-shadow: 0 0 20px rgba(0, 240, 255, 0.15), 0 0 40px rgba(0, 240, 255, 0.05);
                        background: rgba(13, 13, 20, 0.95);
                    }
                    .auth-input-dark::placeholder { color: #48484A; }
                    .auth-btn-primary {
                        padding: 1rem 1.5rem;
                        background: linear-gradient(135deg, #30D158 0%, #00F0FF 100%);
                        color: #000000;
                        border: none;
                        border-radius: 2rem;
                        font-weight: 800;
                        cursor: pointer;
                        font-size: 1rem;
                        box-shadow: 0 4px 20px rgba(48, 209, 88, 0.3), 0 0 40px rgba(0, 240, 255, 0.1);
                        transition: all 0.3s ease;
                        letter-spacing: 1px;
                        text-transform: uppercase;
                        font-family: inherit;
                        width: 100%;
                    }
                    .auth-btn-secondary {
                        padding: 1rem 1.5rem;
                        background: transparent;
                        color: #30D158;
                        border: 1.5px solid rgba(48, 209, 88, 0.4);
                        border-radius: 2rem;
                        font-weight: 700;
                        cursor: pointer;
                        font-size: 1rem;
                        transition: all 0.3s ease;
                        letter-spacing: 0.5px;
                        text-transform: uppercase;
                        font-family: inherit;
                        width: 100%;
                    }
                </style>
                <div style="min-height: 100vh; background: linear-gradient(180deg, #050508 0%, #080810 35%, #0A0A14 65%, #050508 100%); display: flex; align-items: center; justify-content: center; padding: 1.5rem; overflow: hidden; position: relative;">
                    <!-- Ambient glow orbs -->
                    <div style="position: absolute; top: -80px; right: -80px; width: 300px; height: 300px; background: radial-gradient(circle, rgba(48, 209, 88, 0.06) 0%, transparent 70%); border-radius: 50%; z-index: 0; animation: floatOrb 8s ease-in-out infinite;"></div>
                    <div style="position: absolute; bottom: -120px; left: -120px; width: 400px; height: 400px; background: radial-gradient(circle, rgba(0, 240, 255, 0.05) 0%, transparent 70%); border-radius: 50%; z-index: 0; animation: floatOrb 10s ease-in-out infinite reverse;"></div>

                    <div style="max-width: 420px; width: 100%; position: relative; z-index: 1;">
                        <!-- Back button -->
                        <button onclick="render(document.getElementById('root'))" style="display: flex; align-items: center; gap: 0.5rem; background: transparent; border: none; color: #8E8E93; font-size: 0.9rem; cursor: pointer; padding: 0.5rem 0; margin-bottom: 1.5rem; font-family: inherit;">
                            ← Back to Login
                        </button>

                        <!-- Header -->
                        <div style="text-align: center; margin-bottom: 2rem;">
                            <div style="display: inline-block; animation: neonPulse 3s ease-in-out infinite;">
                                <svg width="72" height="72" viewBox="0 0 80 80" style="margin: 0 auto 1rem;">
                                    <defs>
                                        <linearGradient id="signupRingStroke" x1="0%" y1="0%" x2="100%" y2="100%">
                                            <stop offset="0%" style="stop-color:#30D158;stop-opacity:1" />
                                            <stop offset="100%" style="stop-color:#00F0FF;stop-opacity:1" />
                                        </linearGradient>
                                    </defs>
                                    <rect x="0" y="0" width="80" height="80" rx="20" fill="#0D0D14" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
                                    <circle cx="40" cy="40" r="26" fill="none" stroke="url(#signupRingStroke)" stroke-width="4" opacity="0.9"/>
                                    <circle cx="40" cy="40" r="6" fill="#30D158"/>
                                </svg>
                            </div>
                            <h1 style="font-size: 1.75rem; font-weight: 800; color: #F5F5F7; margin-bottom: 0.5rem; letter-spacing: -0.3px;">Create Account</h1>
                            <p style="color: #8E8E93; font-size: 0.875rem;">Start your wellness journey today</p>
                        </div>

                        <!-- Sign Up Form -->
                        <form id="signUpForm" style="display: flex; flex-direction: column; gap: 1.25rem;">
                            <div>
                                <label style="display: block; color: #8E8E93; font-size: 0.75rem; font-weight: 700; margin-bottom: 0.625rem; letter-spacing: 2px; text-transform: uppercase;">Full Name</label>
                                <input type="text" id="signUpName" class="auth-input-dark" placeholder="Enter your full name" required>
                            </div>
                            <div>
                                <label style="display: block; color: #8E8E93; font-size: 0.75rem; font-weight: 700; margin-bottom: 0.625rem; letter-spacing: 2px; text-transform: uppercase;">Phone Number</label>
                                <input type="tel" id="signUpPhone" class="auth-input-dark" placeholder="Enter 10-digit number" pattern="[0-9]{10}" maxlength="10" required>
                            </div>

                            <div style="margin-top: 0.5rem;">
                                <button type="submit" id="signUpSubmitBtn" class="auth-btn-primary">
                                    <span id="signUpSubmitText">Create Account</span>
                                </button>
                            </div>

                            <button type="button" class="auth-btn-secondary" onclick="render(document.getElementById('root'))">
                                Already have an account? Sign In
                            </button>
                        </form>
                    </div>
                </div>
            `;
        }

        function setupSignUpEventListeners(root) {
            const form = document.getElementById('signUpForm');
            if (!form) return;

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                const name = document.getElementById('signUpName').value;
                const phone = document.getElementById('signUpPhone').value;

                if (phone.length !== 10) {
                    showToast('Please enter a valid 10-digit phone number', true);
                    return;
                }

                // Simulate account creation then go to OTP
                const btn = document.getElementById('signUpSubmitBtn');
                const btnText = document.getElementById('signUpSubmitText');
                btn.disabled = true;
                btnText.textContent = 'Sending OTP...';

                setTimeout(() => {
                    window.phoneNumber = phone;
                    window.otpSent = true;
                    const loginRoot = document.getElementById("root");
                    loginRoot.innerHTML = renderLoginPage();
                    setupEventListeners(loginRoot);
                    btn.disabled = false;
                    btnText.textContent = 'Create Account';
                    showToast('OTP sent to ' + phone);
                }, 800);
            });
        }

        function main() {

            const root = document.getElementById("root");
            if (!root) {
                console.error("Root element not found");
                return;
            }

            // Set page based on URL parameter
            if (pageParam === 'login') {
                isLoggedIn = false;
            } else if (pageParam === 'dashboard') {
                isLoggedIn = true;
                currentPage = 'dashboard';
            }

            try {
                render(root);
                setupEventListeners(root);
            } catch (error) {
                console.error("Error during initialization:", error);
                root.innerHTML = `<div style="padding: 2rem; text-align: center; color: rgb(239, 68, 68);"><p>Error loading app</p><p style="font-size: 0.875rem; margin-top: 1rem;">${error.message}</p></div>`;
            }
        }

        function render(root) {
            if (!isLoggedIn) {
                root.innerHTML = renderLoginPage();
            } else {
                root.innerHTML = renderMainApp();
                // Load dynamic data for dashboard
                if (currentPage === 'dashboard') {
                    setTimeout(() => loadDashboardData(), 100);
                }
            }
            setupEventListeners(root);
        }

        function renderLoginPage() {
            const showOtpInput = window.otpSent || false;

            return `
                <style>
                    @keyframes neonPulse {
                        0%, 100% { filter: drop-shadow(0 0 15px rgba(0, 240, 255, 0.4)) drop-shadow(0 0 30px rgba(48, 209, 88, 0.2)); }
                        50% { filter: drop-shadow(0 0 25px rgba(0, 240, 255, 0.6)) drop-shadow(0 0 50px rgba(48, 209, 88, 0.35)); }
                    }
                    @keyframes floatOrb {
                        0%, 100% { transform: translate(0, 0) scale(1); }
                        33% { transform: translate(15px, -20px) scale(1.05); }
                        66% { transform: translate(-10px, 10px) scale(0.95); }
                    }
                    @keyframes shimmer {
                        0% { background-position: -200% center; }
                        100% { background-position: 200% center; }
                    }
                    .auth-input-dark {
                        width: 100%;
                        padding: 1rem 1.25rem;
                        border: 1.5px solid rgba(255, 255, 255, 0.08);
                        border-radius: 1rem;
                        font-size: 1rem;
                        background: rgba(13, 13, 20, 0.8);
                        color: #F5F5F7;
                        transition: all 0.3s ease;
                        font-weight: 500;
                        backdrop-filter: blur(10px);
                        font-family: inherit;
                    }
                    .auth-input-dark:focus {
                        outline: none;
                        border-color: #00F0FF;
                        box-shadow: 0 0 20px rgba(0, 240, 255, 0.15), 0 0 40px rgba(0, 240, 255, 0.05);
                        background: rgba(13, 13, 20, 0.95);
                    }
                    .auth-input-dark::placeholder {
                        color: #48484A;
                    }
                    .otp-input-dark {
                        width: 48px;
                        height: 56px;
                        text-align: center;
                        font-size: 1.5rem;
                        border: 1.5px solid rgba(255, 255, 255, 0.08);
                        border-radius: 0.875rem;
                        font-weight: 700;
                        background: rgba(13, 13, 20, 0.8);
                        color: #F5F5F7;
                        transition: all 0.3s ease;
                        backdrop-filter: blur(10px);
                        font-family: inherit;
                    }
                    .otp-input-dark:focus {
                        outline: none;
                        border-color: #00F0FF;
                        box-shadow: 0 0 20px rgba(0, 240, 255, 0.15), 0 0 40px rgba(0, 240, 255, 0.05);
                        background: rgba(13, 13, 20, 0.95);
                    }
                    .auth-btn-primary {
                        padding: 1rem 1.5rem;
                        background: linear-gradient(135deg, #30D158 0%, #00F0FF 100%);
                        color: #000000;
                        border: none;
                        border-radius: 2rem;
                        font-weight: 800;
                        cursor: pointer;
                        font-size: 1rem;
                        box-shadow: 0 4px 20px rgba(48, 209, 88, 0.3), 0 0 40px rgba(0, 240, 255, 0.1);
                        transition: all 0.3s ease;
                        letter-spacing: 1px;
                        text-transform: uppercase;
                        font-family: inherit;
                        width: 100%;

        // Load and update dashboard data dynamically
        function loadDashboardData() {
            try {
                // Get steps data
                const stepsStr = window.PageBridge.getSteps();
                const stepsData = JSON.parse(stepsStr);
                const stepsValue = stepsData.steps;
                const stepsPercent = Math.round((stepsValue / stepsData.goal) * 100);

                // Get calories data
                const caloriesStr = window.PageBridge.getCalories();
                const caloriesData = JSON.parse(caloriesStr);
                const caloriesValue = caloriesData.calories;
                const caloriesPercent = Math.round((caloriesValue / caloriesData.goal) * 100);

                // Get heart rate data
                const heartRateStr = window.PageBridge.getHeartRate();
                const heartRateData = JSON.parse(heartRateStr);
                const heartRateValue = heartRateData.bpm;

                // Update DOM elements
                const root = document.getElementById("root");
                if (!root) return;

                // Update steps
                const stepsElements = root.querySelectorAll("p");
                for (let el of stepsElements) {
                    if (el.textContent.includes("8,432")) {
                        el.textContent = stepsValue.toLocaleString();
                    }
                    if (el.textContent.includes("84%") && el.parentElement.textContent.includes("of 10")) {
                        el.textContent = stepsPercent + "%";
                    }
                }

                // Update progress bar width for steps
                const progressBars = root.querySelectorAll("div[style*='width: 84%']");
                if (progressBars.length > 0) {
                    progressBars[0].style.width = stepsPercent + "%";
                }

                // Update calories
                const caloriesElements = root.querySelectorAll("p");
                for (let el of caloriesElements) {
                    if (el.textContent.includes("524 kcal")) {
                        el.innerHTML = caloriesValue + ' <span style="font-size: 1rem;">kcal</span>';
                    }
                    if (el.textContent.includes("70%") && el.parentElement.textContent.includes("of 750")) {
                        el.textContent = caloriesPercent + "%";
                    }
                }

                // Update progress bar width for calories
                const progressBars2 = root.querySelectorAll("div[style*='width: 70%']");
                if (progressBars2.length > 0) {
                    progressBars2[0].style.width = caloriesPercent + "%";
                }

                // Update heart rate
                const heartRateElements = root.querySelectorAll("p");
                for (let el of heartRateElements) {
                    if (el.textContent.includes("72 bpm")) {
                        el.innerHTML = heartRateValue + ' <span style="font-size: 1rem;">bpm</span>';
                    }
                }
            } catch (e) {
                console.log("Error loading dashboard data:", e);
            }
        }

        function startMeditationSession(sessionId, title, durationSeconds) {
            // Notify Kotlin about meditation start
            if (window.PageBridge && window.PageBridge.startMeditation) {
                window.PageBridge.startMeditation(sessionId);
            }

            // Show timer UI
            meditationState.active = {
                id: sessionId,
                title: title,
                durationSeconds: durationSeconds,
                remainingSeconds: durationSeconds,
                startTime: Date.now()
            };
            meditationState.isPaused = false;

            const sessionsList = document.querySelector("#meditationSessionsList");
            const timerDisplay = document.querySelector("#meditationTimerDisplay");

            if (sessionsList) sessionsList.style.display = "none";
            if (timerDisplay) timerDisplay.style.display = "block";

            // Update UI
            document.querySelector("#timerSessionName").textContent = title;
            updateMeditationTimer();
            startMeditationCountdown();
        }

        function startMeditationCountdown() {
            if (meditationState.timerInterval) {
                clearInterval(meditationState.timerInterval);
            }

            meditationState.timerInterval = setInterval(() => {
                if (meditationState.isPaused) {
                    return;
                }

                if (meditationState.active.remainingSeconds > 0) {
                    meditationState.active.remainingSeconds--;
                    updateMeditationTimer();
                } else {
                    // Timer completed
                    completeMeditationSession();
                }
            }, 1000);
        }

        function updateMeditationTimer() {
            const session = meditationState.active;
            if (!session) return;

            const minutes = Math.floor(session.remainingSeconds / 60);
            const seconds = session.remainingSeconds % 60;
            const timeStr = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

            const timerDisplay = document.querySelector("#timerDisplay");
            if (timerDisplay) {
                timerDisplay.textContent = timeStr;
            }

            const progress = (session.durationSeconds - session.remainingSeconds) / session.durationSeconds;
            const progressBar = document.querySelector("#timerProgress");
            if (progressBar) {
                progressBar.style.width = (progress * 100) + "%";
            }
        }

        function pauseResumeMeditation() {
            meditationState.isPaused = !meditationState.isPaused;
            const btn = document.querySelector("#pauseResumeBtn");
            if (btn) {

                btn.style.background = meditationState.isPaused ?

                    "linear-gradient(135deg, #14b8a6 0%, #0891b2 100%)";
            }

            if (!meditationState.isPaused) {
                startMeditationCountdown();
            }
        }

        // AI Chat API - Get response based on query
        async function getAIResponse(userMessage) {
            const lowerMessage = userMessage.toLowerCase();
            let category = 'default';

            // Categorize the message
            if (lowerMessage.includes('motiv') || lowerMessage.includes('encourage') || lowerMessage.includes('inspire')) {
                category = 'motivation';
            } else if (lowerMessage.includes('workout') || lowerMessage.includes('exercise') || lowerMessage.includes('train') || lowerMessage.includes('gym')) {
                category = 'workout';
            } else if (lowerMessage.includes('nutrition') || lowerMessage.includes('diet') || lowerMessage.includes('food') || lowerMessage.includes('eat') || lowerMessage.includes('meal')) {
                category = 'nutrition';
            } else if (lowerMessage.includes('sleep') || lowerMessage.includes('rest') || lowerMessage.includes('tired') || lowerMessage.includes('insomnia')) {
                category = 'sleep';
            } else if (lowerMessage.includes('stress') || lowerMessage.includes('anxiety') || lowerMessage.includes('anxious') || lowerMessage.includes('worry') || lowerMessage.includes('relax')) {
                category = 'stress';
            }

            // Get response from database
            const responses = wellnessResponses[category].responses;
            const randomResponse = responses[Math.floor(Math.random() * responses.length)];

            return {
                message: randomResponse,
                category: category,
                emoji: wellnessResponses[category].emoji
            };
        }

        // Send chat message
        async function sendChatMessage() {
            const chatInput = document.querySelector("#chatInput");
            const chatMessages = document.querySelector("#chatMessages");

            if (!chatInput || !chatMessages) return;

            const userMessage = chatInput.value.trim();
            if (!userMessage) return;

            // Add user message to chat
            const userMsgEl = document.createElement("div");
            userMsgEl.style.cssText = "display: flex; justify-content: flex-end;";
            userMsgEl.innerHTML = `
                <div style="background: linear-gradient(135deg, rgb(220, 190, 240) 0%, rgb(210, 180, 230) 100%); color: rgb(80, 40, 120); padding: 1rem 1.25rem; border-radius: 1.25rem; max-width: 85%; border-radius: 0.25rem 1.25rem 1.25rem 1.25rem; box-shadow: 0 2px 4px rgba(200, 160, 220, 0.15);">
                    <p style="margin: 0; font-size: 0.95rem; line-height: 1.4;">${escapeHtml(userMessage)}</p>
                </div>
            `;
            chatMessages.appendChild(userMsgEl);
            chatInput.value = "";

            // Show typing indicator
            const typingEl = document.createElement("div");
            typingEl.style.cssText = "display: flex; justify-content: flex-start;";
            typingEl.innerHTML = `
                <div style="background: rgb(240, 230, 250); color: rgb(120, 100, 140); padding: 1rem 1.25rem; border-radius: 1.25rem; border-radius: 1.25rem 1.25rem 1.25rem 0.25rem; border: 1px solid rgb(230, 220, 240);">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            chatMessages.appendChild(typingEl);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            // Get AI response
            setTimeout(async () => {
                const response = await getAIResponse(userMessage);

                // Remove typing indicator
                typingEl.remove();

                // Add AI response
                const aiMsgEl = document.createElement("div");
                aiMsgEl.style.cssText = "display: flex; justify-content: flex-start;";
                aiMsgEl.innerHTML = `
                    <div style="background: linear-gradient(135deg, rgb(240, 230, 250) 0%, rgb(230, 245, 250) 100%); color: rgb(60, 40, 80); padding: 1rem 1.25rem; border-radius: 1.25rem; max-width: 85%; border-radius: 1.25rem 1.25rem 1.25rem 0.25rem; box-shadow: 0 2px 4px rgba(200, 160, 220, 0.1); border: 1px solid rgb(230, 220, 240);">
                        <p style="margin: 0; font-size: 0.95rem; line-height: 1.4;">${response.message}</p>
                    </div>
                `;
                chatMessages.appendChild(aiMsgEl);
                chatMessages.scrollTop = chatMessages.scrollHeight;

                // Store in history
                chatHistory.push({
                    user: userMessage,
                    ai: response.message,
                    category: response.category,
                    timestamp: new Date()
                });
            }, 800);
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Add typing indicator animation
        const style = document.createElement('style');
        style.textContent = `
            .typing-indicator {
                display: flex;
                gap: 0.4rem;
                padding: 0.5rem 0;
            }
            .typing-indicator span {
                width: 8px;
                height: 8px;
                background: rgb(200, 160, 220);
                border-radius: 50%;
                animation: typing 1.4s infinite;
            }
            .typing-indicator span:nth-child(2) {
                animation-delay: 0.2s;
            }
            .typing-indicator span:nth-child(3) {
                animation-delay: 0.4s;
            }
            @keyframes typing {
                0%, 60%, 100% {
                    opacity: 0.5;
                    transform: translateY(0);
                }
                30% {
                    opacity: 1;
                    transform: translateY(-10px);
                }
            }
            
            @media (max-width: 480px) {
                #chatMessages {
                    padding-right: 0 !important;
                }
            }
        `;
        document.head.appendChild(style);

        // Initialize the app
        document.addEventListener("DOMContentLoaded", main);
    </script>
</body>

</html>
